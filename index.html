<html lang="en">
<title>Clicker Game</title>

<head>
    <h1>Clicker Game!</h1>
    <p id="clicks">Clicks: 0</p>
    <p id="autoclicks">Auto Clicks: 0/s</p>
</head>

<body></body>
<h3>Clickers</h3>
<button type="button" class="clicker" name="Bronze" cost=1 autoclicks=0.5>Buy 1x Bronze Clicker</button>
<button type="button" class="clicker" name="Silver" cost=5 autoclicks=1 >Buy 1x Silver Clicker</button>
<button type="button" class="clicker" name="Gold" cost=15 autoclicks=1.5 >Buy 1x Gold Clicker</button>
<button type="button" class="multiply" multi=1 >x multiplier</button>
<h4>Specials</h4>
<button type="button" class="upgrade" cost=100000 rebirths=1>Rebirth</button>
<br></br>
<button type="button" id="click" class="click">Click Me!</button>
</body>
