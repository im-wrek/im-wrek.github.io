<body>
    <textarea id="code" style="position: absolute; font-family: Arial, Helvetica, sans-serif; resize: none; width: 45%; height: 95vh;"></textarea>
    <div style="position: relative; float: right; width: 45%; height: 95vh;">
        <iframe id="result" style="float: right; width: 100%; height: 100%; position:absolute;" srcdoc=""></iframe>
    </div>
</body>

<script>
    const code = document.getElementById("code")
    const result = document.getElementById("result")
    document.addEventListener("keyup", function (ev) {
        result.setAttribute("srcdoc", code.value.toString())
    })
</script>
